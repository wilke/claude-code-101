# Capstone — conda environment.
#
# Recommended path for the PETSc/TAO backend, because conda-forge ships
# prebuilt petsc4py binaries — no compiler, no MPI install, no waiting.
#
# Create with:
#     conda env create -f environment.yml
#     conda activate claude-capstone
#
# Or, if you use mamba (faster):
#     mamba env create -f environment.yml

name: claude-capstone
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.11

  # Core numerics
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7

  # PETSc + petsc4py (prebuilt — this is the whole reason for conda here)
  - petsc>=3.20
  - petsc4py>=3.20

  # Testing
  - pytest>=7.4
  - pytest-timeout>=2.2

  # MCP exercise (optional, only needed for the stretch goal of wiring the
  # capstone to the toy-solver MCP from exercise 5)
  - cvxpy>=1.4
  - pip
  - pip:
      - mcp>=1.0
